<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | AllergyGuide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-100 flex items-center justify-center h-screen">

    <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md fade-in">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black text-[#1A2E44] tracking-tight">ALLERGY<span class="text-[#0094D4]">GUIDE</span></h1>
            <p class="text-gray-500 text-sm mt-2 font-medium">Please log in to access the Admin Dashboard</p>
        </div>

        <div id="error-msg" class="hidden mb-4 p-3 bg-red-50 text-red-600 text-xs font-bold rounded-xl text-center border border-red-100"></div>

        <div class="space-y-4">
            <div>
                <label class="text-[10px] font-bold uppercase text-gray-400 ml-2">Admin Email</label>
                <input type="email" id="login-email" placeholder="admin@gmail.com" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all">
            </div>
            <div>
                <label class="text-[10px] font-bold uppercase text-gray-400 ml-2">Password</label>
                <input type="password" id="login-password" placeholder="••••••••" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all">
            </div>
            
            <button onclick="handleLogin()" id="loginBtn" class="w-full bg-[#1A2E44] text-white p-4 rounded-2xl font-bold hover:bg-black transition shadow-lg shadow-slate-200">
                Log In
            </button>

            <div class="relative py-4">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-100"></div></div>
                <div class="relative flex justify-center text-[10px] uppercase"><span class="bg-white px-3 text-gray-400 font-bold">Or</span></div>
            </div>

            <button onclick="handleGoogleLogin()" class="w-full bg-white border border-gray-200 text-gray-700 p-4 rounded-2xl font-bold hover:bg-gray-50 transition flex items-center justify-center space-x-3 shadow-sm">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5" alt="Google Logo">
                <span>Sign in with Google</span>
            </button>
        </div>

        <div class="mt-8 text-center">
            <a href="en-FirstPage.HTML" class="text-xs text-gray-400 hover:text-[#0094D4] transition font-bold">← Back to Home Page</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            signInWithPopup, 
            GoogleAuthProvider 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Firebase configuration remains identical
        const firebaseConfig = {
            apiKey: "AIzaSyCCPVG-1Cn6MRt9c-AWUMSiJOf_i4DqdTA",
            authDomain: "allergyguide-c9ed9.firebaseapp.com",
            projectId: "allergyguide-c9ed9",
            appId: "1:364105086732:web:4f45ed7968f9af0ced7b29"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const errorDiv = document.getElementById('error-msg');

        // LOGIN LOGIC
        window.handleLogin = async function() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('loginBtn');

            if(!email || !password) { showErr("Please fill in all fields!"); return; }

            btn.innerText = "Verifying...";
            btn.disabled = true;
            errorDiv.classList.add('hidden');

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = "en-admin-dashboard.html";
            } catch (error) {
                btn.innerText = "Log In";
                btn.disabled = false;
                showErr("Access Denied: Incorrect email or password!");
            }
        }

        // GOOGLE LOGIN LOGIC
        window.handleGoogleLogin = async function() {
            try {
                await signInWithPopup(auth, provider);
                window.location.href = "en-admin-dashboard.html";
            } catch (error) {
                showErr("Failed to log in with Google.");
            }
        }

        function showErr(msg) {
            errorDiv.innerText = msg;
            errorDiv.classList.remove('hidden');
        }
    </script>
</body>
</html>

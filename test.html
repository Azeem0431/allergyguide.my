<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | AllergyGuide.my</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .hero-gradient { background: linear-gradient(135deg, #0094D4 0%, #0076aa 100%); }
        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        .dark .chat-container::-webkit-scrollbar-thumb { background: #334155; }
        #sidebar { transition: transform 0.3s ease-in-out; }
        .emergency-blink { animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>

    <script>
        // Letakkan logik tema di sini supaya ia load sepantas kilat sebelum body muncul
        function toggleDarkMode() {
            const html = document.documentElement;
            const icon = document.getElementById('darkIcon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                if(icon) icon.innerText = '🌙';
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                if(icon) icon.innerText = '☀️';
            }
        }

        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
</head>

<body class="bg-[#F8FAFC] text-gray-800 dark:bg-slate-950 dark:text-gray-100">

    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-[60] hidden transition-opacity"></div>

    <aside id="sidebar" class="fixed top-0 left-0 h-full w-72 bg-white dark:bg-slate-900 z-[70] shadow-2xl transform -translate-x-full lg:hidden">
        <div class="p-6">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-xl font-black text-[#0094D4]">Main Menu</h2>
                <button onclick="toggleSidebar()" class="text-gray-400 hover:text-red-500 text-2xl transition">&times;</button>
            </div>
            <nav class="space-y-4">
                <a href="en-FirstPage.html" class="flex items-center space-x-3 p-3 rounded-xl bg-blue-50 dark:bg-slate-800 text-[#0094D4] font-bold">
                    <span>🏠 Home</span>
                </a>
                <a href="en-categories.html" class="flex items-center space-x-3 p-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-800 font-semibold transition">
                    <span>🔍 Allergy Categories</span>
                </a>
                <hr class="my-4 border-gray-100 dark:border-slate-800">
                <a href="tel:999" class="flex items-center space-x-3 p-3 rounded-xl bg-red-50 dark:bg-red-900/20 text-red-600 font-bold transition">
                    <span>☎️ Call 999</span>
                </a>
            </nav>
        </div>
    </aside>

    <header class="bg-white dark:bg-slate-900 border-b dark:border-slate-800 sticky top-0 z-50 transition-colors">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <button onclick="toggleSidebar()" class="md:hidden text-gray-600 dark:text-gray-300 p-1 hover:bg-gray-100 dark:hover:bg-slate-800 rounded-lg transition">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </button>
                <h1 class="text-2xl font-extrabold text-[#0094D4]">AllergyGuide.My</h1>
            </div>

            <nav class="hidden md:flex space-x-8 font-semibold text-gray-600 dark:text-gray-300">
                <a href="en-FirstPage.html" class="text-[#0094D4]">Home</a>
                <a href="en-categories.html" class="hover:text-[#0094D4] transition">Allergy Categories</a>
            </nav>
            
            <div class="flex items-center gap-4">
                <button onclick="toggleDarkMode()" class="p-2 rounded-full bg-gray-100 dark:bg-slate-800 text-gray-600 dark:text-yellow-400 transition-all border dark:border-slate-700">
                    <span id="darkIcon">🌙</span>
                </button>

                <div class="flex bg-gray-100 dark:bg-slate-800 p-1 rounded-full border border-gray-200 dark:border-slate-700">
                    <a href="FirstPage.HTML" class="px-3 py-1 rounded-full text-xs font-bold text-gray-500 dark:text-gray-400">BM</a>
                    <a href="en-FirstPage.html" class="px-3 py-1 rounded-full text-xs font-bold bg-white dark:bg-slate-600 shadow-sm text-blue-600 dark:text-white">EN</a>
                </div>
            </div>
        </div>
    </header>

    <main class="p-10 text-center">
        <h2 class="text-4xl font-bold mb-4">Welcome to Allergy Guide</h2>
        <p class="text-gray-600 dark:text-gray-400">Try switching to Dark Mode using the moon icon above!</p>
    </main>

    <script>
        const MISTRAL_API_KEY = "60WHWYBuGH4fxqEiYXQ8vI4UE1C27xdn";

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.toggle('hidden');
        }

        // Jalankan icon check bila page siap load
        window.onload = function() {
            const icon = document.getElementById('darkIcon');
            if (document.documentElement.classList.contains('dark')) {
                if(icon) icon.innerText = '☀️';
            }
        };
    </script>
</body>
</html>
